name: Build Development APK (Android)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-development-android
  cancel-in-progress: false

jobs:
  build-and-publish-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets['EXPO_PUBLIC_FIREBASE_API_KEY'] }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets['EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN'] }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_PROJECT_ID'] }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets['EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET'] }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'] }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_APP_ID'] }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID'] }}
      GEMINI_API_KEY: ${{ secrets['GEMINI_API_KEY'] }}
      FIREBASE_ADMIN_SDK_KEY: ${{ secrets['FIREBASE_ADMIN_SDK_KEY'] }}
      ADMIN_BOOTSTRAP_KEY: ${{ secrets['ADMIN_BOOTSTRAP_KEY'] }}
      API_KEY_21ST: ${{ secrets['API_KEY_21ST'] }}
      EXPO_NO_DEPENDENCY_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Expo and npm folders
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.expo
            ~/.eas
          key: ${{ runner.os }}-expo-apk-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-apk-

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Ensure eas & expo CLI are available
        shell: bash
        run: |
          set -euo pipefail
          attempt=0
          max=3
          until [ $attempt -ge $max ]
          do
            if command -v eas >/dev/null 2>&1 || npx --yes eas-cli@latest --version >/dev/null 2>&1; then
              echo "eas-cli available"
            else
              echo "Installing eas-cli and expo-cli (attempt $((attempt+1)))"
              npm install --no-save --no-audit --no-fund eas-cli expo-cli || true
            fi

            if (command -v eas >/dev/null 2>&1) || npx --yes eas-cli@latest --version >/dev/null 2>&1; then
              echo "eas-cli ready"
              break
            fi

            attempt=$((attempt+1))
            sleep $((attempt * 5))
          done

          if ! (command -v eas >/dev/null 2>&1 || npx --yes eas-cli@latest --version >/dev/null 2>&1); then
            echo "Warning: eas-cli not available after retries; the workflow will still continue and the expo action will attempt its own installation."
          fi

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          packager: npm
          token: ${{ secrets['EXPO_TOKEN'] }}

      - name: Install dependencies (cache miss)
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Use cached dependencies
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: echo "Using cached node_modules"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN nao esta definido nos GitHub Secrets"
            exit 1
          fi

      - name: Skip stale run when newer commit exists
        id: freshness
        shell: bash
        env:
          GH_TOKEN: ${{ secrets['GITHUB_TOKEN'] }}
        run: |
          set -euo pipefail
          LATEST_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha)"
          if [ "${LATEST_SHA}" != "${GITHUB_SHA}" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale run for ${GITHUB_SHA}; latest is ${LATEST_SHA}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump preview version (patch)
        if: steps.freshness.outputs.should_build == 'true'
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
        run: node scripts/version-bump.js patch

      - name: Build preview APK on EAS
        if: steps.freshness.outputs.should_build == 'true'
        id: build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_JSON="$(npx --yes eas-cli@latest build --platform android --profile development --non-interactive --wait --json)"
          printf '%s\n' "${BUILD_JSON}" > build.json

          APK_URL="$(node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('build.json','utf8')); const b=Array.isArray(d)?d[0]:d; console.log((b?.artifacts?.buildUrl || b?.artifacts?.applicationArchiveUrl || '').trim());")"

          if [ -z "${APK_URL}" ]; then
            echo "Nao foi possivel obter a URL do APK em build.json"
            cat build.json
            exit 1
          fi

          APK_FILE="hugoal-development-${GITHUB_SHA::7}.apk"
                    APK_FILE="hugoal-development-${GITHUB_SHA::7}.apk"
          curl -fsSL "${APK_URL}" -o "${APK_FILE}"

          echo "apk_file=${APK_FILE}" >> "$GITHUB_OUTPUT"
          echo "apk_url=${APK_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        if: steps.freshness.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hugoal-development-apk-${{ github.run_id }}
          path: |
            ${{ steps.build.outputs.apk_file }}
            build.json

      - name: Publish APK in GitHub Release
        if: steps.freshness.outputs.should_build == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets['GITHUB_TOKEN'] }}
        run: |
          set -euo pipefail

          RELEASE_TAG="development-apk-latest"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"

          if ! gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "HuGoal Development APK (Latest)" --notes "Release automatica com o APK de development mais recente." --prerelease
          fi

          gh release upload "${RELEASE_TAG}" "${{ steps.build.outputs.apk_file }}" build.json --clobber
          gh release edit "${RELEASE_TAG}" --notes "APK preview mais recente.\n\n- Commit: ${GITHUB_SHA}\n- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\n- Download: ${RELEASE_URL}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Android Development APK"
            if [ "${{ steps.freshness.outputs.should_build }}" = "true" ]; then
              echo "- Arquivo: ${{ steps.build.outputs.apk_file }}"
              echo "- Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/development-apk-latest"
              echo "- Artifact do run: aba Artifacts deste workflow"
            else
              echo "- Build ignorado por estar obsoleto (ja existe commit mais novo na branch)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
