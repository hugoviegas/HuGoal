name: Preview OTA Update (Android)

on:
  push:
    branches-ignore:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "stores/**"
      - "hooks/**"
      - "lib/**"
      - "constants/**"
      - "assets/**"
      - "locales/**"
      - "types/**"
      - "app.json"
      - "eas.json"
      - "metro.config.js"
      - "babel.config.js"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tailwind.config.js"
      - "global.css"
      - "index.ts"
      - "App.tsx"
  workflow_dispatch:
    inputs: {}

permissions:
  contents: read

concurrency:
  group: ota-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ota:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets['EXPO_PUBLIC_FIREBASE_API_KEY'] }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets['EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN'] }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_PROJECT_ID'] }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets['EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET'] }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'] }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_APP_ID'] }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets['EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID'] }}
      GEMINI_API_KEY: ${{ secrets['GEMINI_API_KEY'] }}
      FIREBASE_ADMIN_SDK_KEY: ${{ secrets['FIREBASE_ADMIN_SDK_KEY'] }}
      ADMIN_BOOTSTRAP_KEY: ${{ secrets['ADMIN_BOOTSTRAP_KEY'] }}
      API_KEY_21ST: ${{ secrets['API_KEY_21ST'] }}
      EXPO_NO_DEPENDENCY_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Expo and npm folders
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.expo
            ~/.eas
          key: ${{ runner.os }}-expo-ota-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-ota-

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Ensure eas & expo CLI are available
        shell: bash
        run: |
          set -euo pipefail
          attempt=0
          max=3
          until [ $attempt -ge $max ]
          do
            if command -v eas >/dev/null 2>&1 || npx --yes eas-cli@latest --version >/dev/null 2>&1; then
              echo "eas-cli available"
            else
              echo "Installing eas-cli and expo-cli (attempt $((attempt+1)))"
              npm install --no-save --no-audit --no-fund eas-cli expo-cli || true
            fi

            if (command -v eas >/dev/null 2>&1) || npx --yes eas-cli@latest --version >/dev/null 2>&1; then
              echo "eas-cli ready"
              break
            fi

            attempt=$((attempt+1))
            sleep $((attempt * 5))
          done

          if ! (command -v eas >/dev/null 2>&1 || npx --yes eas-cli@latest --version >/dev/null 2>&1); then
            echo "Warning: eas-cli not available after retries; the workflow will still continue and the expo action will attempt its own installation."
          fi

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          packager: npm
          token: ${{ secrets['EXPO_TOKEN'] }}

      - name: Install dependencies (cache miss)
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Use cached dependencies
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: echo "Using cached node_modules"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN nao esta definido nos GitHub Secrets"
            exit 1
          fi

      - name: Bump preview version (patch)
        env:
          CI_BUILD_NUMBER: ${{ github.run_number }}
        run: node scripts/version-bump.js patch

      - name: Resolve OTA target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          echo "eas_branch=preview" >> "$GITHUB_OUTPUT"
          echo "eas_platform=android" >> "$GITHUB_OUTPUT"

      - name: Ensure channel is linked to branch
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL="${{ steps.target.outputs.eas_branch }}"

          # Prefer the `eas` binary installed by expo action; fallback to npx
          if command -v eas >/dev/null 2>&1 && eas channel:view "${CHANNEL}" --non-interactive > /dev/null 2>&1; then
            eas channel:edit "${CHANNEL}" --non-interactive || true
          else
            if command -v eas >/dev/null 2>&1; then
              eas channel:create "${CHANNEL}" --non-interactive || true
            else
              npx --yes eas-cli@latest channel:create "${CHANNEL}" --non-interactive || true
            fi
          fi

      - name: Publish OTA update
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          MESSAGE="CI OTA ${GITHUB_REF_NAME} ${GITHUB_SHA::7}"
          UPDATE_JSON="$(npx --yes eas-cli@latest update --branch "${{ steps.target.outputs.eas_branch }}" --platform "${{ steps.target.outputs.eas_platform }}" --message "${MESSAGE}" --non-interactive --json)"

          printf '%s\n' "${UPDATE_JSON}" > update.json

          GROUP_ID="$(echo "${UPDATE_JSON}" | jq -r 'if type=="array" then (.[0].group // .[0].updateGroup // "n/a") else (.group // .updateGroup // "n/a") end')"
          PLATFORMS="$(echo "${UPDATE_JSON}" | jq -r 'if type=="array" then ([.[].platform] | join(",")) else (.platform // "unknown") end')"

          echo "group_id=${GROUP_ID}" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

      - name: Upload OTA metadata
        uses: actions/upload-artifact@v4
        with:
          name: expo-ota-metadata-${{ github.run_id }}
          path: update.json

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Expo OTA published"
            echo "- Git branch: ${GITHUB_REF_NAME}"
            echo "- EAS branch: ${{ steps.target.outputs.eas_branch }}"
            echo "- Platforms: ${{ steps.publish.outputs.platforms }}"
            echo "- Update group: ${{ steps.publish.outputs.group_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
